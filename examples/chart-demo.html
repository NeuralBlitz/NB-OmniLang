<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniLang Document</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #333;
    }
    h1 { font-size: 2.5em; margin-bottom: 0.5em; }
    h2 { font-size: 2em; margin-top: 1.5em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
    h3 { font-size: 1.5em; margin-top: 1.2em; }
    .omni-data-loaded {
      background: #e8f5e9;
      padding: 10px 15px;
      border-left: 4px solid #4caf50;
      margin: 15px 0;
      font-size: 0.9em;
    }
    .omni-compute-result {
      background: #e3f2fd;
      padding: 10px 15px;
      border-left: 4px solid #2196f3;
      margin: 15px 0;
      font-size: 0.9em;
    }
    .omni-error {
      background: #ffebee;
      padding: 10px 15px;
      border-left: 4px solid #f44336;
      margin: 15px 0;
      color: #c62828;
    }
    .omni-chart {
      margin: 30px 0;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
    }
    canvas {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <h1>Chart Visualization Demo</h1><p>This document demonstrates OmniLang's chart capabilities.</p><h2>Bar Chart Example</h2><div class="omni-data-loaded">✓ Data loaded: sales (4 records)</div><div class="omni-chart">
          <canvas id="chart-0" width="600" height="400"></canvas>
        </div><h2>Pie Chart Example</h2><div class="omni-chart">
          <canvas id="chart-1" width="600" height="400"></canvas>
        </div><h2>Line Chart Example</h2><div class="omni-chart">
          <canvas id="chart-2" width="600" height="400"></canvas>
        </div><h2>Summary</h2><p>Total revenue across all regions: $```omni:inline sum(data.sales, 'revenue')```
521000</p>

  <script>
    
    (function() {
      const ctx = document.getElementById('chart-0');
      if (!ctx) return;

      new Chart(ctx, {
        type: 'bar',
        data: {"labels":["North","South","East","West"],"datasets":[{"label":"revenue","data":[125000,98000,156000,142000],"backgroundColor":"rgba(54, 162, 235, 0.5)","borderColor":"rgba(54, 162, 235, 1)","borderWidth":2}]},
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: 'Revenue by Region'
            },
            legend: {
              display: false
            }
          },
          
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    })();
    

    (function() {
      const ctx = document.getElementById('chart-1');
      if (!ctx) return;

      new Chart(ctx, {
        type: 'pie',
        data: {"labels":["North","South","East","West"],"datasets":[{"label":"revenue","data":[125000,98000,156000,142000],"backgroundColor":"rgba(54, 162, 235, 0.5)","borderColor":"rgba(54, 162, 235, 1)","borderWidth":2}]},
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: 'Market Share'
            },
            legend: {
              display: true
            }
          },
          
        }
      });
    })();
    

    (function() {
      const ctx = document.getElementById('chart-2');
      if (!ctx) return;

      new Chart(ctx, {
        type: 'line',
        data: {"labels":["North","South","East","West"],"datasets":[{"label":"revenue","data":[125000,98000,156000,142000],"backgroundColor":"rgba(54, 162, 235, 0.5)","borderColor":"rgba(54, 162, 235, 1)","borderWidth":2}]},
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: 'Revenue Trend'
            },
            legend: {
              display: false
            }
          },
          
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    })();
    
  </script>
</body>
</html>
